name: Desktop release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  verify:
    name: Verify application
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
          run_install: false
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm test:desktop
      - run: python -m unittest companion.test_config
      - run: pnpm lint
      - run: pnpm build

  build:
    name: Build ${{ matrix.name }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            command: desktop:win
            artifact: windows
            files: release/*.exe
          - name: macOS
            os: macos-latest
            command: desktop:mac
            artifact: macos
            files: |
              release/*.dmg
              release/*.zip
          - name: Linux
            os: ubuntu-latest
            command: desktop:linux
            artifact: linux
            files: |
              release/*.AppImage
              release/*.deb
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
          run_install: false
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm ${{ matrix.command }}
      - uses: actions/upload-artifact@v6
        with:
          name: InHouseRx-${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error
          compression-level: 0

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: release
          merge-multiple: true
      - name: Publish unsigned desktop packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}" release/*
          --repo "${GITHUB_REPOSITORY}"
          --title "InHouseRx ${GITHUB_REF_NAME}"
          --generate-notes
          --notes "Unsigned preview builds for Windows, macOS, and Linux. Your operating system may display a security warning until certificate-backed signing is added."

